<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi mamá ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <section class="mensaje">
            <h1>¡Hola mamá! ❤️</h1>
            <p>Decidí hacerte este pequeño detalle para decirte cuánto te quiero.</p>
            <span class="scroll-down">Desliza hacia abajo ↓</span>
        </section>

        <section class="mensaje">
            <p>Gracias por ser mi motor y mi mayor inspiración en cada paso que doy.</p>
        </section>

        <section class="mensaje">
            <p>Por estar siempre ahí, en los buenos y no tan buenos momentos.</p>
            <!-- He puesto mama.jpeg porque así se llama tu archivo en NetBeans -->
            <img src="mama.jpeg" alt="Nosotros" class="foto-final">
            <h2>¡Feliz día de la madre!</h2>
            <p class="firma">Hecho con mucho ❤️ por Adrian</p>
        </section>
    </div>
</body>
</html>
